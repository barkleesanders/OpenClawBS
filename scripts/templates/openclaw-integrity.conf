# systemd drop-in that wires openclaw-integrity-check.sh into
# openclaw-gateway.service as a pre-start guard.
#
# Install:
#   sudo cp openclaw-integrity.conf /etc/systemd/system/openclaw-gateway.service.d/integrity.conf
#   sudo systemctl daemon-reload
#
# The check script enumerates runtime-*.js chunks referenced by dist/
# and restores from the most recent snapshot if any are missing. See
# docs/12-openclaw-native-first.md.

[Service]
ExecStartPre=/usr/local/sbin/openclaw-integrity-check.sh
